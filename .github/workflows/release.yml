name: Release Windows installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.0). Used only for manual runs.'
        required: false
        default: '0.0.0-dev'

permissions:
  contents: write  # required to create GitHub Releases

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            v="${GITHUB_REF_NAME#v}"
          else
            v="${{ inputs.version }}"
          fi
          echo "value=$v" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $v"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.11.1

      - name: Build with PyInstaller
        run: pyinstaller cleardeck.spec --noconfirm --clean

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Inno Setup installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.version.outputs.value }} cleardeck.iss

      - name: Upload installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: CleardeckSetup-${{ steps.version.outputs.value }}
          path: dist/CleardeckSetup.exe
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: Cleardeck ${{ steps.version.outputs.value }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/CleardeckSetup.exe
          fail_on_unmatched_files: true
